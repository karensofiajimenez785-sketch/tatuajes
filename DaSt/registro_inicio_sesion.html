<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="style.css">

</head>

<body class="body">
    <div class="contenRegistro">
        <h1>Registro</h1>

        <form id="registroForm" class="form-fields_registro">
            <!-- Nombre -->
            <div class="campo_registro">
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required>
                <span class="errorMensaje" id="error-nombre"></span>
            </div>

            <!-- Apellidos -->
            <div class="campo_registro">
                <label for="apellidos">Apellidos *</label>
                <input type="text" id="apellidos" name="apellidos" placeholder="Ingrese sus apellidos" required>
                <span class="errorMensaje" id="error-apellidos"></span>
            </div>

            <!-- Fecha de Nacimiento -->
            <div class="campo_registro">
                <label for="fechaNacimiento">Fecha de Nacimiento *</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                <span class="errorMensaje" id="error-fecha"></span>
            </div>

            <!-- Correo -->
            <div class="campo_registro">
                <label for="correo">Correo Electrónico *</label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
                <span class="errorMensaje" id="error-correo"></span>
            </div>

            <!-- Contraseña -->
            <div class="campo_registro">
                <label for="contraseña">Contraseña *</label>
                <input type="password" id="contraseña" name="contraseña" placeholder="Mínimo 8 caracteres" required>
                <span class="errorMensaje_registro" id="error-contraseña"></span>
            </div>

            <!-- Verificar Contraseña -->
            <div class="campo_registro">
                <label for="verificarContrasena">Verificar Contraseña *</label>
                <input type="password" id="verificarContrasena" name="verificarContrasena"
                    placeholder="Repita la contraseña" required>
                <span class="password-mismatch" id="error-verificar"></span>
                <span class="password-match" id="success-verificar"></span>
            </div>

            <span class="success-message_registro" id="successMessage"></span>

            <!-- Botones -->
            <div class="button-row">
                <button type="submit" class="btn-registro">Registrarse</button>
                <button type="reset" class="btn-limpiar_registro">Limpiar</button>
            </div>
        </form>

        <p style="text-align: center; margin-top: 15px;">
            ¿Ya tienes cuenta? <a href="inicio_sesion.html"
                style="color: #286954; text-decoration: none; font-weight: bold;">Inicia sesión aquí</a>
        </p>
    </div>
    <script>

        document.getElementById("registroForm")
            .addEventListener("submit", function (e) {

                e.preventDefault();

                /* Capturar datos */

                let nombre =
                    document.getElementById("nombre").value;

                let apellidos =
                    document.getElementById("apellidos").value;

                let fecha =
                    document.getElementById("fechaNacimiento").value;

                let correo =
                    document.getElementById("correo").value;

                let contraseña =
                    document.getElementById("contraseña").value;

                let verificar =
                    document.getElementById("verificarContrasena").value;

                /* Validar contraseña */

                if (contraseña !== verificar) {

                    document.getElementById("error-verificar")
                        .textContent = "Las contraseñas no coinciden";

                    return;

                }

                /* Crear objeto usuario */

                let usuario = {

                    nombre: nombre,
                    apellidos: apellidos,
                    fechaNacimiento: fecha,
                    correo: correo,
                    contraseña: contraseña

                };

                /* Obtener lista existente */

                let usuarios =
                    JSON.parse(localStorage.getItem("usuarios")) || [];

                /* Agregar usuario */

                usuarios.push(usuario);

                /* Guardar */

                localStorage.setItem("usuarios",
                    JSON.stringify(usuarios));

                /* Mensaje */

                document.getElementById("successMessage")
                    .textContent = "Registro exitoso";

                /* Redireccion */

                setTimeout(() => {

                    window.location.href = "inicio_sesion.html";

                }, 1000);

            });

    </script>


</body>

</html>
